services:
  pg:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: k2epr
      POSTGRES_USER: k2epr
      POSTGRES_PASSWORD: k2epr
      PGDATA: /var/lib/postgresql/data
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready']
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:

