services:
  pg:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: k2epr
      POSTGRES_USER: k2epr
      POSTGRES_PASSWORD: k2epr
      PGDATA: /var/lib/postgresql/data
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready']
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: k2-api
    environment:
      DATABASE_URL: postgresql+asyncpg://k2epr:k2epr@pg:5432/k2epr              
    depends_on:
      pg:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

